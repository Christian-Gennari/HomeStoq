# 🏠 HomeStoq Configuration
# 
# Full documentation: _docs/03-configuration.md
# Online: https://github.com/christian-gennari/HomeStoq/blob/main/_docs/03-configuration.md
#
# Quick Reference:
#   [App]               - Language (Swedish/English)
#   [AI]                - Gemini model selection
#   [API]               - API endpoint override (optional, auto-derived from HostUrl)
#   [GoogleKeepScraper] - All scraper settings: KeepListName, HostUrl, timing, browser mode

[App]
Language=Swedish

[AI]
Model=gemini-3.1-flash-lite-preview

[API]
# Optional: Override auto-derived API URL. See docs for Docker/network scenarios.
# BaseUrl=http://localhost/api/voice/command

[GoogleKeepScraper]
KeepListName=inköpslistan, inköpslista
ActiveHours=07-23
PollIntervalSeconds=45
PollIntervalJitterSeconds=15
HostUrl=http://*:80
BrowserMode=RemoteDebugging
ChromeRelaunchAttempts=5
