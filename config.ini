# 🏠 HomeStoq Configuration
# This file is the single source of truth for your pantry settings.

[App]
# Language for all AI parsing (voice, receipt scanning, and shopping list suggestions).
# Supported: Swedish (default), English
Language=Swedish

[Voice]
# The name(s) of the Google Keep list(s) the scraper will monitor for voice commands.
# You can provide multiple lists separated by commas.
# Example: inköpslistan, HomeStoq, Groceries
KeepListName=inköpslistan, inköpslista

[API]
# The full endpoint where the keep-scraper sends processed voice commands.
# Standard: http://localhost:5000/api/voice/command
BaseUrl=http://localhost:5000/api/voice/command

# The host and port the HomeStoq server will bind to.
# Use 'http://*:5000' to listen on all network interfaces (required for Docker and network access).
# Use 'http://localhost:5000' to only allow access from your computer.
HostUrl=http://*:5000
