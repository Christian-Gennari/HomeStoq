# 🏠 HomeStoq Configuration
# This file is the single source of truth for your pantry settings.

[App]
# Language for all AI parsing (voice, receipt scanning, and shopping list suggestions).
# Supported: Swedish (default), English
Language=Swedish

[Voice]
# The name(s) of the Google Keep list(s) the scraper will monitor for voice commands.
# You can provide multiple lists separated by commas.
# Example: inköpslistan, HomeStoq, Groceries
KeepListName=inköpslistan, inköpslista

[Scraper]
# Active hours for the scraper (24-hour format). 
# Example: 07-23 (Scraper works from 7 AM to 11 PM).
# Default: 07-23 (Recommended to avoid 24/7 bot patterns).
ActiveHours=07-23

# The interval (in seconds) the scraper waits between checks.
PollIntervalSeconds=45
PollIntervalJitterSeconds=15

# The host and port the HomeStoq server will bind to.
# Use 'http://*:PORT' to listen on all network interfaces (required for Docker and network access).
# Use 'http://localhost:PORT' to only allow access from your computer.
HostUrl=http://*:80

[AI]
# The Gemini model to use for AI features (voice parsing, receipt scanning, chat).
#
# --- Stable / Production-Ready Model Options ---
# Model=gemini-3.1-flash-lite-preview ; RECOMMENDED: Fast and efficient for most tasks, with good reasoning capabilities. Ideal for general use.
# Model=gemini-2.5-flash              ; BEST FALLBACK: Best balance of speed and intelligence. Fully stable, lowest risk of rate limiting.
# Model=gemini-2.5-pro                ; Heavy Lifter: Best for complex logic, deep reasoning, and strict meal planning.
# Model=gemini-2.5-flash-lite         ; Background Worker: Fastest and most generous limits for simple text extraction. Also great fallback.
# Model=gemini-embedding-001          ; Search Enhancer: Stable embedding model for natural language semantic search.

Model=gemini-3.1-flash-lite-preview