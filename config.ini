# 🏠 HomeStoq Configuration
# This file is the single source of truth for your pantry settings.

[App]
# Language for all AI parsing (voice, receipt scanning, and shopping list suggestions).
# Supported: Swedish (default), English
Language=Swedish

[Database]
# The file path to your SQLite database.
# For Docker, keep this as /app/data/homestoq.db to match your mounted volume.
Path=/app/data/homestoq.db

[Voice]
# The name of the Google Keep list the scraper will monitor for voice commands.
# Example: inköpslistan, HomeStoq, Groceries
KeepListName=inköpslistan

[API]
# The full endpoint where the keep-scraper sends processed voice commands.
# Standard: http://localhost:80/api/voice/command
BaseUrl=http://localhost:80/api/voice/command

# The host and port the HomeStoq server will bind to.
# Use 'http://*:80' to listen on all network interfaces (required for Docker and network access).
# Use 'http://localhost:80' to only allow access from your computer.
HostUrl=http://*:80
