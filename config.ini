# 🏠 HomeStoq Configuration
# 
# Full documentation: _docs/03-configuration.md
# Online: https://github.com/christian-gennari/HomeStoq/blob/main/_docs/03-configuration.md
#
# Quick Reference:
#   [App]               - Global settings: Language, HostUrl (server binding)
#   [AI]                - AI provider selection and settings
#   [API]               - API endpoint override (optional, auto-derived from HostUrl)
#   [GoogleKeepScraper] - Scraper settings: KeepListName, timing, browser mode (inherits HostUrl from [App])

[App]
Language=Swedish
HostUrl=http://*:5050    # Server binding URL (used by API and scraper for callbacks)

[AI]
# Provider selection: "Gemini" or "OpenRouter"
# API keys are set in .env file (GEMINI_API_KEY, OPENROUTER_API_KEY)
Provider=Gemini

# Gemini settings (used when Provider=Gemini)
GeminiModel=gemini-2.5-flash-lite
# GeminiBaseUrl=                    # Optional: override default OpenAI-compatible endpoint

# OpenRouter settings (used when Provider=OpenRouter)
OpenRouterModel=openrouter/free
# OpenRouterBaseUrl=                # Optional: override default https://openrouter.ai/api/v1

[AI.Resilience]
# Retry and cross-provider fallback configuration
EnableRetry=true
RetryAttempts=3
RetryBaseDelayMs=1000
RetryBackoffMultiplier=2
EnableCrossProviderFallback=true      # Fallback to other provider if primary fails
EnableCircuitBreaker=true
CircuitBreakerFailureThreshold=5
CircuitBreakerRecoveryTimeout=60

[API]
# Optional: Override auto-derived API URL. See docs for Docker/network scenarios.
# BaseUrl=http://localhost:5050/api/voice/command

[GoogleKeepScraper]
KeepListName=inköpslistan, inköpslista
ActiveHours=07-23
PollIntervalSeconds=45
PollIntervalJitterSeconds=15
BrowserMode=RemoteDebugging
Headless=false
ChromeRelaunchAttempts=5
