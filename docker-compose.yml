services:
  homestoq:
    build: .
    container_name: homestoq
    ports:
      - "5050:5050"
    volumes:
      - ./config.ini:/app/config.ini:ro
      - ./data:/app/data
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    container_name: homestoq-scraper
    depends_on:
      - homestoq
    volumes:
      - ./config.ini:/app/config.ini:ro
      - ./data:/app/data:ro
      - ./chrome-profile:/app/browser-profile
    environment:
      - GOOGLE_USERNAME=${GOOGLE_USERNAME}
      - GOOGLE_PASSWORD=${GOOGLE_PASSWORD}
    ports:
      - "6080:6080" # noVNC web interface
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'HomeStoq.Plugins.GoogleKeepScraper' > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
