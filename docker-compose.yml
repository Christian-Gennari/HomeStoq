services:
  homestoq:
    build: .
    container_name: homestoq
    ports:
      - "80:5000"
    volumes:
      - ./config.ini:/app/config.ini:ro
      - ./data:/app/data
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/inventory"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    container_name: homestoq-scraper
    depends_on:
      - homestoq
    volumes:
      - ./config.ini:/app/config.ini:ro
      - ./chrome-profile:/app/browser-profile
    environment:
      - GOOGLE_USERNAME=${GOOGLE_USERNAME}
      - GOOGLE_PASSWORD=${GOOGLE_PASSWORD}
      - GOOGLEKEEPSCRAPER__HOSTURL=http://homestoq:5000 # Point to the other container
    ports:
      - "6080:6080" # noVNC web interface
    restart: unless-stopped
