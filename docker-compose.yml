services:
  homestoq:
    build: .
    container_name: homestoq
    ports:
      - "80:8080"
    volumes:
      - ./config.ini:/app/config.ini:ro
      - ./data:/app/data
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/inventory"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
