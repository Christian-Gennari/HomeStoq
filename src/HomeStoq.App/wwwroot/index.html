<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeStoq | Smart Pantry</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- Core Styles -->
    <link rel="stylesheet" href="css/core.css">
    
    <!-- Feature Styles -->
    <link rel="stylesheet" href="features/inventory/inventory.css">
    <link rel="stylesheet" href="features/scan/scan.css">
    <link rel="stylesheet" href="features/receipts/receipts.css">
    <link rel="stylesheet" href="features/chat/chat.css">
    <link rel="stylesheet" href="features/shopping/shopping.css">
</head>
<body x-data="pantryApp()">
    
    <div class="container">
        <header>
            <div class="brand">
                <h1>HomeStoq</h1>
                <p>Intelligent Pantry Assistant</p>
            </div>
            <nav>
                <button class="nav-link" :class="view === 'inventory' && 'active'" @click="view = 'inventory'" x-text="t('nav.stock')"></button>
                <button class="nav-link" :class="view === 'receipt' && 'active'" @click="view = 'receipt'" x-text="t('nav.scan')"></button>
                <button class="nav-link" :class="view === 'receipts_history' && 'active'" @click="view = 'receipts_history'" x-text="t('nav.receipts')"></button>
                <button class="nav-link" :class="view === 'shopping' && 'active'" @click="view = 'shopping'" x-text="t('nav.list')"></button>
                <button class="nav-link chat-nav" @click="toggleChat()" x-text="t('nav.chat')"></button>
            </nav>
        </header>

        <!-- Dashboard Pulse -->
        <div class="pulse-bar" x-show="view === 'inventory'">
            <div class="pulse-stat">
                <span class="label" x-text="t('pulse.total')"></span>
                <span class="value" x-text="items.length"></span>
            </div>
            <div class="pulse-stat">
                <span class="label" x-text="t('pulse.low')"></span>
                <span class="value" x-text="items.filter(i => i.quantity == 0).length" :style="items.filter(i => i.quantity == 0).length > 0 && 'color: var(--zest)'"></span>
            </div>
            <div class="pulse-stat">
                <span class="label" x-text="t('pulse.cats')"></span>
                <span class="value" x-text="Object.keys(categorizedItems).length"></span>
            </div>
        </div>

        <main>
            <!-- View: Inventory -->
            <template x-if="view === 'inventory'">
                <section>
                    <div class="view-controls">
                        <div class="search-wrapper">
                            <input type="text" class="search-input" :placeholder="t('inv.search')" x-model="search">
                            <button x-show="search.length > 0" class="search-clear" @click="search = ''" aria-label="Clear search">×</button>
                        </div>
                        <button class="btn-primary" @click="manualAdd()" x-text="t('inv.add')" aria-label="Add new item"></button>
                    </div>

                    <div x-show="loading" class="state-box">
                        <div class="spinner"></div>
                        <p x-text="t('inv.refreshing')"></p>
                    </div>

                    <div x-show="!loading && items.length === 0" class="state-box">
                        <h3 x-text="t('inv.empty.title')"></h3>
                        <p x-text="t('inv.empty.desc')"></p>
                    </div>

                    <div class="masonry-grid">
                        <template x-for="(group, category) in categorizedItems" :key="category">
                            <div class="category-group" x-show="group.length > 0">
                                <h2 class="category-title" x-text="category"></h2>
                                <ul class="item-list">
                                    <template x-for="item in group" :key="item.itemName">
                                        <li class="item-row" :class="isLowStock(item)">
                                            <div class="item-info">
                                                <span x-show="item.quantity == 0" class="low-stock-dot"></span>
                                                <span x-show="item.quantity == 1" class="low-stock-dot-warning"></span>
                                                <span class="item-name" x-text="item.itemName"></span>
                                            </div>
                                            <div class="qty-pill">
                                                <button class="qty-act" @click="updateQty(item.itemName, -1)">−</button>
                                                <span class="qty-val" x-text="formatQty(item.quantity)"></span>
                                                <button class="qty-act" @click="updateQty(item.itemName, 1)">+</button>
                                            </div>
                                        </li>
                                    </template>
                                </ul>
                            </div>
                        </template>
                    </div>
                </section>
            </template>

            <!-- View: Receipt Scan -->
            <template x-if="view === 'receipt'">
                <section>
                    <div class="view-header">
                        <h2 x-text="t('scan.title')"></h2>
                        <p class="view-description" x-text="t('scan.desc')"></p>
                    </div>

                    <div class="scan-area">
                        <label class="dropzone">
                            <input type="file" @change="handleFile" accept="image/*" capture="environment" hidden>
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
                            <span x-text="t('scan.photo')"></span>
                        </label>
                        <label class="dropzone">
                            <input type="file" @change="handleFile" accept="image/*,application/pdf" hidden>
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                            <span x-text="t('scan.doc')"></span>
                        </label>
                    </div>

                    <div x-show="selectedFile" class="scan-ready">
                        <p x-text="t('scan.ready') + ' ' + selectedFile?.name"></p>
                        <button class="btn-primary" @click="uploadReceipt" :disabled="scanning">
                            <span x-show="!scanning" x-text="t('scan.btn')"></span>
                            <span x-show="scanning" x-text="t('scan.btn.active')"></span>
                        </button>
                    </div>

                    <div x-show="scanResults.length > 0" class="scan-results">
                        <h3 class="category-title" x-text="t('scan.results')"></h3>
                        <ul class="item-list">
                            <template x-for="res in scanResults" :key="res.itemName">
                                <li class="scan-result-row">
                                    <span class="item-name" x-text="res.itemName + ' (x' + res.quantity + ')'"></span>
                                    <span class="item-meta" x-text="res.price ? formatCurrency(res.price) : 'No price'"></span>
                                </li>
                            </template>
                        </ul>
                    </div>
                </section>
            </template>

            <!-- View: Receipts History -->
            <template x-if="view === 'receipts_history'">
                <section>
                    <div class="view-header">
                        <h2 x-text="t('nav.receipts')"></h2>
                        <p class="view-description" x-text="t('receipts.desc')"></p>
                    </div>

                    <div x-show="receipts.length === 0" class="state-box">
                        <p x-text="t('receipts.empty')"></p>
                    </div>

                    <div class="receipts-list">
                        <template x-for="r in receipts" :key="r.id">
                            <div class="receipt-card">
                                <div class="receipt-header" @click="toggleReceipt(r.id)">
                                    <div class="receipt-info">
                                        <span class="store-name" x-text="r.storeName"></span>
                                        <span class="receipt-date" x-text="formatDate(r.timestamp)"></span>
                                    </div>
                                    <div class="receipt-amount">
                                        <span x-text="formatCurrency(r.totalAmountPaid)"></span>
                                        <span class="chevron" :class="expandedReceiptId === r.id && 'open'">▼</span>
                                    </div>
                                </div>
                                <div x-show="expandedReceiptId === r.id" class="receipt-details" x-collapse>
                                    <ul class="item-list detail-list">
                                        <template x-for="item in receiptItems" :key="item.id">
                                            <li class="item-row">
                                                <div class="item-info">
                                                    <span class="item-name" x-text="item.itemName"></span>
                                                    <p class="item-expanded" x-text="item.expandedName"></p>
                                                </div>
                                                <span class="item-qty" x-text="'x' + item.quantity"></span>
                                            </li>
                                        </template>
                                    </ul>
                                </div>
                            </div>
                        </template>
                    </div>
                </section>
            </template>

            <!-- View: Inköpslistor (Shopping Lists) with Subtabs -->
            <template x-if="view === 'shopping'">
                <section class="shopping-clean">
                    
                    <!-- ===== VIEW 1: NY LISTA (Compose with AI) ===== -->
                    <div x-show="shopSubtab === 'create' && !shoppingMode && !editMode" class="view-compose">
                        
                        <!-- Header -->
                        <div class="shop-header-clean">
                            <h2 x-text="language === 'Swedish' ? 'Inköpslista' : 'Shopping List'"></h2>
                            <div class="shop-tabs">
                                <button class="tab active" x-text="language === 'Swedish' ? 'Ny lista' : 'New List'"></button>
                                <button @click="switchShopSubtab('saved')" class="tab" x-text="language === 'Swedish' ? 'Sparade' : 'Saved'"></button>
                            </div>
                        </div>
                        
                        <!-- Split Panel: Chat + List -->
                        <div class="compose-split-panel">
                            
                            <!-- Chat Section -->
                            <div class="chat-section">
                                <div class="compose-chat">
                                    <div class="chat-messages" x-ref="chatThread">
                                        <template x-for="msg in composeList.messages" :key="msg.timestamp">
                                            <div class="chat-bubble" :class="msg.role">
                                                <span x-show="msg.role === 'assistant'" class="chat-avatar">🤖</span>
                                                <div class="bubble-content" x-text="msg.content"></div>
                                            </div>
                                        </template>
                                        <div x-show="composeList.isLoading" class="chat-bubble assistant">
                                            <span class="chat-avatar">🤖</span>
                                            <div class="bubble-content">
                                                <div class="typing-indicator">
                                                    <span></span><span></span><span></span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div class="chat-input-area">
                                        <input type="text" 
                                               x-model="composeList.chatInput" 
                                               :placeholder="language === 'Swedish' ? 'Skriv här...' : 'Type here...'"
                                               @keyup.enter="sendChatMessage()">
                                        <button @click="sendChatMessage()" class="send-btn">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                                        </button>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- List Section -->
                            <div class="list-section">
                                <!-- Empty list welcome -->
                                <div x-show="composeList.items.filter(i => !i.isDismissed).length === 0" class="compose-empty" style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
                                    <span class="compose-icon">🛒</span>
                                    <h3 x-text="language === 'Swedish' ? 'Vad ska vi handla idag?' : 'What are we shopping for today?'"></h3>
                                    <p x-text="language === 'Swedish' ? 'Berätta vad du behöver i chatten, så hjälper jag dig att bygga en smart inköpslista!' : 'Tell me what you need in the chat, and I\'ll help you build a smart shopping list!'" style="color: var(--warm-gray); font-size: 1rem; line-height: 1.6; max-width: 280px; margin: 0 auto 2rem;"></p>
                                    <div class="compose-hints" style="display: flex; flex-direction: column; gap: 0.5rem; align-items: center; opacity: 0.7;">
                                        <small x-text="language === 'Swedish' ? '💡 Prova: "Jag ska göra lasagne" eller "Mjölk, ägg och bröd"' : '💡 Try: "I\'m making lasagne" or "Milk, eggs and bread"'" style="font-size: 0.85rem; color: var(--warm-gray);"></small>
                                    </div>
                                </div>

                                <!-- Categorized List -->
                                <div x-show="composeList.items.filter(i => !i.isDismissed).length > 0" class="compose-list">
                                    <div style="flex: 1; overflow-y: auto;">
                                        <template x-for="category in categories" :key="category">
                                            <div x-show="getComposeItemsByCategory(category).length > 0" class="category-block">
                                                <div class="category-header-clean">
                                                    <span x-text="getCategoryDisplayName(category)"></span>
                                                    <span class="category-emoji" x-text="categoryEmojis[category]"></span>
                                                </div>
                                                
                                                <template x-for="item in getComposeItemsByCategory(category)" :key="item.id">
                                                    <div class="compose-item">
                                                        <span class="item-text" x-text="item.itemName"></span>
                                                        <div class="item-qty-control">
                                                            <button @click="changeComposeQuantity(item.id, -1)" :disabled="item.quantity <= 1">−</button>
                                                            <span x-text="item.quantity"></span>
                                                            <button @click="changeComposeQuantity(item.id, 1)">+</button>
                                                        </div>
                                                        <button @click="removeComposeItem(item.id)" class="item-remove">
                                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                                        </button>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>
                                    </div>
                                    
                                    <div class="compose-actions">
                                        <button @click="copyComposeList()" class="btn-secondary">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 16px; height: 16px;"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                            <span x-text="language === 'Swedish' ? 'Kopiera' : 'Copy'"></span>
                                        </button>
                                        <button @click="saveComposeList()" class="btn-primary">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px;"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                                            <span x-text="language === 'Swedish' ? 'Spara lista' : 'Save list'"></span>
                                        </button>
                                        <button @click="clearAndGreet()" class="btn-secondary btn-danger">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 16px; height: 16px;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                                            <span x-text="language === 'Swedish' ? 'Rensa' : 'Clear'"></span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    
                    <!-- ===== VIEW 2: SPARADE (Saved Lists + Archive) ===== -->
                    <div x-show="shopSubtab === 'saved' && !shoppingMode && !editMode" class="view-saved">
                        
                        <!-- Header -->
                        <div class="shop-header-clean">
                            <h2 x-text="language === 'Swedish' ? 'Inköpslista' : 'Shopping List'"></h2>
                            <div class="shop-tabs">
                                <button @click="switchShopSubtab('create')" class="tab" x-text="language === 'Swedish' ? 'Ny lista' : 'New List'"></button>
                                <button class="tab active" x-text="language === 'Swedish' ? 'Sparade' : 'Saved'"></button>
                            </div>
                        </div>
                        
                        <!-- Active Lists -->
                        <div class="saved-section">
                            <h3 x-text="language === 'Swedish' ? 'Mina listor' : 'My Lists'"></h3>
                            
                            <div x-show="savedLists.length === 0" class="saved-empty">
                                <span>📋</span>
                                <p x-text="language === 'Swedish' ? 'Inga sparade listor än' : 'No saved lists yet'"></p>
                                <button @click="switchShopSubtab('create')" x-text="language === 'Swedish' ? 'Skapa lista →' : 'Create list →'"></button>
                            </div>
                            
                            <div class="saved-list">
                                <template x-for="list in savedLists" :key="list.id">
                                    <div class="saved-item" :class="{ 'expanded': expandedSavedListId === list.id }">
                                        <div class="saved-item-header" @click="expandedSavedListId = expandedSavedListId === list.id ? null : list.id">
                                            <div class="saved-info">
                                                <h4 x-text="list.name"></h4>
                                                <p x-text="list.itemCount + (language === 'Swedish' ? ' varor' : ' items')"></p>
                                            </div>
                                            <div class="saved-meta">
                                                <svg class="chevron-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                                            </div>
                                        </div>
                                        
                                        <div x-show="expandedSavedListId === list.id" class="saved-item-preview" x-collapse>
                                            <div class="preview-items">
                                                <template x-for="(item, idx) in list.items.slice(0, 5)" :key="idx">
                                                    <span class="preview-item-chip">
                                                        <span x-text="item.itemName"></span>
                                                        <span class="qty" x-text="'x' + item.quantity"></span>
                                                    </span>
                                                </template>
                                                <span x-show="list.items.length > 5" class="preview-more" x-text="'+' + (list.items.length - 5) + (language === 'Swedish' ? ' till' : ' more')"></span>
                                            </div>
                                            <div class="preview-actions">
                                                <button @click="enterShoppingMode(list)" class="btn-shop">
                                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px;"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                                                    <span x-text="language === 'Swedish' ? 'Handla' : 'Shop'"></span>
                                                </button>
                                                <button @click="enterEditMode(list)" class="btn-edit">
                                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                                                    <span x-text="language === 'Swedish' ? 'Redigera' : 'Edit'"></span>
                                                </button>
                                                <button @click="deleteSavedList(list.id)" class="btn-delete">
                                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                        
                        <!-- Archive -->
                        <div x-show="archivedLists.length > 0" class="archive-section">
                            <h3 x-text="language === 'Swedish' ? 'Tidigare' : 'History'"></h3>
                            <div class="saved-list">
                                <template x-for="list in archivedLists" :key="list.id">
                                    <div class="saved-item archived" :class="{ 'expanded': expandedSavedListId === list.id }">
                                        <div class="saved-item-header" @click="expandedSavedListId = expandedSavedListId === list.id ? null : list.id">
                                            <div class="saved-info">
                                                <h4>
                                                    <span x-show="list.status === 'completed'" style="color: var(--sage); margin-right: 0.35rem;">✓</span>
                                                    <span x-text="list.name"></span>
                                                </h4>
                                                <p x-text="list.itemCount + (language === 'Swedish' ? ' varor' : ' items')"></p>
                                            </div>
                                            <div class="saved-meta">
                                                <span class="archive-badge" x-text="language === 'Swedish' ? 'Klar' : 'Done'"></span>
                                                <svg class="chevron-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                                            </div>
                                        </div>
                                        
                                        <div x-show="expandedSavedListId === list.id" class="saved-item-preview" x-collapse>
                                            <div class="preview-items">
                                                <template x-for="(item, idx) in list.items.slice(0, 5)" :key="idx">
                                                    <span class="preview-item-chip">
                                                        <span x-text="item.itemName"></span>
                                                        <span class="qty" x-text="'x' + item.quantity"></span>
                                                    </span>
                                                </template>
                                                <span x-show="list.items.length > 5" class="preview-more" x-text="'+' + (list.items.length - 5) + (language === 'Swedish' ? ' till' : ' more')"></span>
                                            </div>
                                            <div class="preview-actions">
                                                <button @click="enterShoppingMode(list)" class="btn-shop">
                                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px;"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                                                    <span x-text="language === 'Swedish' ? 'Handla igen' : 'Shop again'"></span>
                                                </button>
                                                <button @click="deleteSavedList(list.id, true)" class="btn-delete">
                                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                                                    <span x-text="language === 'Swedish' ? 'Ta bort' : 'Delete'"></span>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                    
                    
                    <!-- ===== VIEW 3: SHOPPING MODE (Read-only + Check) ===== -->
                    <div x-show="shoppingMode && activeShoppingList" class="view-shopping">
                        
                        <!-- Shopping Header -->
                        <div class="shopping-header">
                            <button @click="exitShoppingMode()" class="back-btn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                            </button>
                            <h3 x-text="activeShoppingList.name"></h3>
                            <span class="shopping-count" :class="{ 'complete': activeShoppingList.items.filter(i => i.isChecked).length === activeShoppingList.items.length }">
                                <span x-text="activeShoppingList.items.filter(i => i.isChecked).length"></span>
                                <span>/</span>
                                <span x-text="activeShoppingList.items.length"></span>
                            </span>
                        </div>
                        
                        <!-- Shopping List - Category Grouped -->
                        <div class="shopping-items">
                            <template x-for="category in categories" :key="category">
                                <div x-show="getShoppingItemsByCategory(category).length > 0" class="shopping-category">
                                    <div class="shopping-category-header">
                                        <span x-text="getCategoryDisplayName(category)"></span>
                                        <span x-text="categoryEmojis[category]"></span>
                                    </div>
                                    <div class="shopping-rows">
                                        <template x-for="(item, index) in getShoppingItemsByCategory(category)" :key="index">
                                            <div @click="toggleShoppingCheck(item.originalIndex)" class="shopping-row" :class="{ 'checked': item.isChecked }">
                                                <button class="shopping-check" :class="{ 'checked': item.isChecked }">
                                                    <svg x-show="item.isChecked" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                                                </button>
                                                <span class="shopping-text" x-text="item.itemName"></span>
                                                <span class="shopping-qty" x-text="'x' + item.quantity"></span>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </template>
                        </div>
                        
                        <!-- Shopping Actions -->
                        <div class="shopping-actions">
                            <button @click="resetShoppingChecks()" class="btn-secondary" :title="language === 'Swedish' ? 'Nollställ' : 'Reset'">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
                            </button>
                            <button @click="enterEditMode(activeShoppingList)" class="btn-secondary" :title="language === 'Swedish' ? 'Redigera' : 'Edit'">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                            </button>
                            <button @click="completeShoppingTrip()" class="btn-primary">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px;"><polyline points="20 6 9 17 4 12"></polyline></svg>
                                <span x-text="language === 'Swedish' ? 'Klar' : 'Done'"></span>
                            </button>
                        </div>
                    </div>
                    
                    
                    <!-- ===== VIEW 4: EDIT MODE (Manual, no AI) ===== -->
                    <div x-show="editMode && editingList" class="view-edit">
                        
                        <!-- Edit Header -->
                        <div class="edit-header">
                            <div class="edit-header-top">
                                <button @click="exitEditMode()" class="back-btn">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                                </button>
                                <h3 x-text="language === 'Swedish' ? 'Redigera lista' : 'Edit list'"></h3>
                            </div>
                            <span class="edit-list-name" x-text="editingList.name"></span>
                        </div>
                        
                        <!-- Edit List -->
                        <div class="edit-list">
                            <template x-for="(item, index) in editingItems" :key="item.id">
                                <div class="edit-row">
                                    <input type="text" 
                                           x-model="item.name" 
                                           class="edit-item-input"
                                           :placeholder="language === 'Swedish' ? 'Vara...' : 'Item...'"
                                           @keyup.enter="addEditItem()">
                                    <div class="qty-stepper">
                                        <button @click="item.quantity = Math.max(1, item.quantity - 1)">−</button>
                                        <span x-text="item.quantity"></span>
                                        <button @click="item.quantity++">+</button>
                                    </div>
                                    <button @click="removeEditItem(index)" class="edit-remove">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                                    </button>
                                </div>
                            </template>
                            
                            <button @click="addEditItem()" class="edit-add-btn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                                <span x-text="language === 'Swedish' ? 'Lägg till vara' : 'Add item'"></span>
                            </button>
                        </div>
                        
                        <!-- Edit Actions -->
                        <div class="edit-actions">
                            <button @click="exitEditMode()" class="btn-secondary" x-text="language === 'Swedish' ? 'Avbryt' : 'Cancel'"></button>
                            <button @click="saveEditChanges()" class="btn-primary">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px;"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                                <span x-text="language === 'Swedish' ? 'Spara ändringar' : 'Save changes'"></span>
                            </button>
                        </div>
                    </div>
                    
                </section>
            </template>
        </main>
    </div>

    <!-- Chat Slide-over -->
    <div x-show="showChat" class="chat-overlay" @click.self="showChat = false" x-cloak>
        <div class="chat-window" x-transition:enter="chat-slide-in" x-transition:leave="chat-slide-out">
            <div class="chat-header">
                <h3 x-text="t('chat.title')"></h3>
                <button @click="showChat = false">×</button>
            </div>
            <div class="chat-messages" x-ref="chatBox">
                <template x-for="msg in chatHistory" :key="msg.id">
                    <div class="msg-wrapper" :class="msg.role === 'user' ? 'user' : 'assistant'">
                        <div class="msg-bubble" x-text="msg.content"></div>
                    </div>
                </template>
                <div x-show="chatLoading" class="msg-wrapper assistant">
                    <div class="msg-bubble loading-dots">...</div>
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" x-model="chatInput" :placeholder="t('chat.placeholder')" @keyup.enter="sendMessage">
                <button @click="sendMessage" :disabled="chatLoading" x-text="t('chat.send')"></button>
            </div>
        </div>
    </div>

    <!-- Toasts -->
    <template x-for="toast in toasts" :key="toast.id">
        <div class="toast" :class="toast.type" x-text="toast.message" @click="removeToast(toast.id)"></div>
    </template>

    <!-- Add Item Modal -->
    <div x-show="showAddModal" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0" class="modal-overlay" @click.self="showAddModal = false" @keydown.escape.window="showAddModal = false">
        <div class="modal-content" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-95">
            <h3 x-text="t('inv.add')"></h3>
            <input type="text" x-model="newItemName" :placeholder="t('prompt.add')" @keyup.enter="submitAddItem">
            <div class="modal-actions">
                <button @click="showAddModal = false" x-text="t('modal.cancel')"></button>
                <button class="btn-primary" @click="submitAddItem" x-text="t('modal.confirm')"></button>
            </div>
        </div>
    </div>

    <!-- i18n Translations -->
    <script src="js/i18n.js"></script>
    
    <!-- Feature Modules -->
    <script src="features/inventory/inventory.js"></script>
    <script src="features/scan/scan.js"></script>
    <script src="features/receipts/receipts.js"></script>
    <script src="features/chat/chat.js"></script>
    <script src="features/shopping/shopping.js"></script>
    
    <!-- Main App Orchestrator -->
    <script src="js/main.js"></script>
</body>
</html>
