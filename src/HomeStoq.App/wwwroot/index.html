<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeStoq | Smart Pantry</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- Core Styles -->
    <link rel="stylesheet" href="css/core.css">
    
    <!-- Feature Styles -->
    <link rel="stylesheet" href="features/inventory/inventory.css">
    <link rel="stylesheet" href="features/scan/scan.css">
    <link rel="stylesheet" href="features/receipts/receipts.css">
    <link rel="stylesheet" href="features/chat/chat.css">
    <link rel="stylesheet" href="features/shopping/shopping.css">
</head>
<body x-data="pantryApp()">
    
    <div class="container">
        <header>
            <div class="brand">
                <h1>HomeStoq</h1>
                <p>Intelligent Pantry Assistant</p>
            </div>
            <nav>
                <button class="nav-link" :class="view === 'inventory' && 'active'" @click="view = 'inventory'" x-text="t('nav.stock')"></button>
                <button class="nav-link" :class="view === 'receipt' && 'active'" @click="view = 'receipt'" x-text="t('nav.scan')"></button>
                <button class="nav-link" :class="view === 'receipts_history' && 'active'" @click="view = 'receipts_history'" x-text="t('nav.receipts')"></button>
                <button class="nav-link" :class="view === 'shopping' && 'active'" @click="view = 'shopping'" x-text="t('nav.list')"></button>
                <button class="nav-link chat-nav" @click="toggleChat()" x-text="t('nav.chat')"></button>
            </nav>
        </header>

        <!-- Dashboard Pulse -->
        <div class="pulse-bar" x-show="view === 'inventory'">
            <div class="pulse-stat">
                <span class="label" x-text="t('pulse.total')"></span>
                <span class="value" x-text="items.length"></span>
            </div>
            <div class="pulse-stat">
                <span class="label" x-text="t('pulse.low')"></span>
                <span class="value" x-text="items.filter(i => i.quantity == 0).length" :style="items.filter(i => i.quantity == 0).length > 0 && 'color: var(--zest)'"></span>
            </div>
            <div class="pulse-stat">
                <span class="label" x-text="t('pulse.cats')"></span>
                <span class="value" x-text="Object.keys(categorizedItems).length"></span>
            </div>
        </div>

        <main>
            <!-- View: Inventory -->
            <template x-if="view === 'inventory'">
                <section>
                    <div class="view-controls">
                        <div class="search-wrapper">
                            <input type="text" class="search-input" :placeholder="t('inv.search')" x-model="search">
                            <button x-show="search.length > 0" class="search-clear" @click="search = ''" aria-label="Clear search">×</button>
                        </div>
                        <button class="btn-primary" @click="manualAdd()" x-text="t('inv.add')" aria-label="Add new item"></button>
                    </div>

                    <div x-show="loading" class="state-box">
                        <div class="spinner"></div>
                        <p x-text="t('inv.refreshing')"></p>
                    </div>

                    <div x-show="!loading && items.length === 0" class="state-box">
                        <h3 x-text="t('inv.empty.title')"></h3>
                        <p x-text="t('inv.empty.desc')"></p>
                    </div>

                    <div class="masonry-grid">
                        <template x-for="(group, category) in categorizedItems" :key="category">
                            <div class="category-group" x-show="group.length > 0">
                                <h2 class="category-title" x-text="category"></h2>
                                <ul class="item-list">
                                    <template x-for="item in group" :key="item.itemName">
                                        <li class="item-row" :class="isLowStock(item)">
                                            <div class="item-info">
                                                <span x-show="item.quantity == 0" class="low-stock-dot"></span>
                                                <span x-show="item.quantity == 1" class="low-stock-dot-warning"></span>
                                                <span class="item-name" x-text="item.itemName"></span>
                                            </div>
                                            <div class="qty-pill">
                                                <button class="qty-act" @click="updateQty(item.itemName, -1)">−</button>
                                                <span class="qty-val" x-text="formatQty(item.quantity)"></span>
                                                <button class="qty-act" @click="updateQty(item.itemName, 1)">+</button>
                                            </div>
                                        </li>
                                    </template>
                                </ul>
                            </div>
                        </template>
                    </div>
                </section>
            </template>

            <!-- View: Receipt Scan -->
            <template x-if="view === 'receipt'">
                <section>
                    <div class="view-header">
                        <h2 x-text="t('scan.title')"></h2>
                        <p class="view-description" x-text="t('scan.desc')"></p>
                    </div>

                    <div class="scan-area">
                        <label class="dropzone">
                            <input type="file" @change="handleFile" accept="image/*" capture="environment" hidden>
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
                            <span x-text="t('scan.photo')"></span>
                        </label>
                        <label class="dropzone">
                            <input type="file" @change="handleFile" accept="image/*,application/pdf" hidden>
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                            <span x-text="t('scan.doc')"></span>
                        </label>
                    </div>

                    <div x-show="selectedFile" class="scan-ready">
                        <p x-text="t('scan.ready') + ' ' + selectedFile?.name"></p>
                        <button class="btn-primary" @click="uploadReceipt" :disabled="scanning">
                            <span x-show="!scanning" x-text="t('scan.btn')"></span>
                            <span x-show="scanning" x-text="t('scan.btn.active')"></span>
                        </button>
                    </div>

                    <div x-show="scanResults.length > 0" class="scan-results">
                        <h3 class="category-title" x-text="t('scan.results')"></h3>
                        <ul class="item-list">
                            <template x-for="res in scanResults" :key="res.itemName">
                                <li class="scan-result-row">
                                    <span class="item-name" x-text="res.itemName + ' (x' + res.quantity + ')'"></span>
                                    <span class="item-meta" x-text="res.price ? formatCurrency(res.price) : 'No price'"></span>
                                </li>
                            </template>
                        </ul>
                    </div>
                </section>
            </template>

            <!-- View: Receipts History -->
            <template x-if="view === 'receipts_history'">
                <section>
                    <div class="view-header">
                        <h2 x-text="t('nav.receipts')"></h2>
                        <p class="view-description" x-text="t('receipts.desc')"></p>
                    </div>

                    <div x-show="receipts.length === 0" class="state-box">
                        <p x-text="t('receipts.empty')"></p>
                    </div>

                    <div class="receipts-list">
                        <template x-for="r in receipts" :key="r.id">
                            <div class="receipt-card">
                                <div class="receipt-header" @click="toggleReceipt(r.id)">
                                    <div class="receipt-info">
                                        <span class="store-name" x-text="r.storeName"></span>
                                        <span class="receipt-date" x-text="formatDate(r.timestamp)"></span>
                                    </div>
                                    <div class="receipt-amount">
                                        <span x-text="formatCurrency(r.totalAmountPaid)"></span>
                                        <span class="chevron" :class="expandedReceiptId === r.id && 'open'">▼</span>
                                    </div>
                                </div>
                                <div x-show="expandedReceiptId === r.id" class="receipt-details" x-collapse>
                                    <ul class="item-list detail-list">
                                        <template x-for="item in receiptItems" :key="item.id">
                                            <li class="item-row">
                                                <div class="item-info">
                                                    <span class="item-name" x-text="item.itemName"></span>
                                                    <p class="item-expanded" x-text="item.expandedName"></p>
                                                </div>
                                                <span class="item-qty" x-text="'x' + item.quantity"></span>
                                            </li>
                                        </template>
                                    </ul>
                                </div>
                            </div>
                        </template>
                    </div>
                </section>
            </template>

            <!-- View: Inköpslistor (Shopping Lists) with Subtabs -->
            <template x-if="view === 'shopping'">
                <section class="shopping-factory">
                    <!-- Header with Subtabs -->
                    <div class="shop-header">
                        <h2 x-text="language === 'Swedish' ? 'Inköpslistor' : 'Shopping Lists'"></h2>
                        <div class="shop-subtabs">
                            <button 
                                @click="switchShopSubtab('create')" 
                                :class="{ 'active': shopSubtab === 'create' }"
                                class="shop-subtab">
                                <span x-text="language === 'Swedish' ? 'Skapa lista' : 'Create List'"></span>
                            </button>
                            <button 
                                @click="switchShopSubtab('view')" 
                                :class="{ 'active': shopSubtab === 'view' }"
                                class="shop-subtab">
                                <span x-text="language === 'Swedish' ? 'Se inköpslistor' : 'View Lists'"></span>
                                <span x-show="savedLists.length > 0" class="badge" x-text="savedLists.length"></span>
                            </button>
                        </div>
                    </div>

                    <!-- SUBTAB: Create List (Conversational) -->
                    <div x-show="shopSubtab === 'create'" class="subtab-content">
                        <!-- Empty State - Welcome Hero -->
                        <div x-show="buyList.messages.length === 0 && !buyList.isLoading" class="welcome-hero">
                            <div class="hero-icon-row">📝 🛒 🥑</div>
                            <h3 x-text="language === 'Swedish' ? 'Skapa en ny inköpslista' : 'Create a new shopping list'"></h3>
                            <p class="subtitle" x-text="language === 'Swedish' ? 'Jag kan hjälpa dig brainstorma vad du behöver köpa.' : 'I can help you brainstorm what you need to buy.'"></p>
                            
                            <div class="action-cards">
                                <div class="action-card" @click="startNewList(); sendChatMessage(language === 'Swedish' ? 'Föreslå baserat på mina mönster' : 'Suggest based on my patterns')">
                                    <span class="action-card-icon">🤖</span>
                                    <h4 x-text="language === 'Swedish' ? 'AI Assist' : 'AI Assist'"></h4>
                                    <p x-text="language === 'Swedish' ? 'Få förslag baserat på dina tidigare inköp' : 'Get suggestions based on your purchase history'"></p>
                                </div>
                                <div class="action-card" @click="startNewList()">
                                    <span class="action-card-icon">✏️</span>
                                    <h4 x-text="language === 'Swedish' ? 'Starta Tom' : 'Start Fresh'"></h4>
                                    <p x-text="language === 'Swedish' ? 'Bygg din egen lista från scratch' : 'Build your own list from scratch'"></p>
                                </div>
                            </div>
                        </div>

                        <!-- Chat Interface -->
                        <div x-show="buyList.messages.length > 0" class="chat-container">
                            <!-- Chat Thread -->
                            <div class="chat-thread" x-ref="chatThread">
                                <template x-for="(msg, index) in buyList.messages" :key="index">
                                    <div class="message-wrapper" :class="msg.role">
                                        <!-- AI Avatar -->
                                        <div x-show="msg.role === 'assistant'" class="ai-avatar-enhanced">🤖</div>
                                        
                                        <!-- Message Bubble -->
                                        <div class="message-bubble" :class="msg.role">
                                            <div class="message-content" x-text="msg.content"></div>
                                            <div class="message-meta" x-text="new Date(msg.timestamp).toLocaleTimeString(language === 'Swedish' ? 'sv-SE' : 'en-US', {hour: '2-digit', minute:'2-digit'})"></div>
                                            
                                            <!-- Enhanced Action Confirmation Card -->
                                            <div x-show="msg.requiresConfirmation && msg.actions && msg.actions.length > 0" 
                                                 class="confirmation-panel">
                                                <div class="confirmation-header">
                                                    <span class="icon">✨</span>
                                                    <h5 x-text="language === 'Swedish' ? 'Föreslagna ändringar' : 'Suggested Changes'"></h5>
                                                </div>
                                                <div class="item-preview-grid">
                                                    <template x-for="action in msg.actions.slice(0, 6)" :key="action.itemName">
                                                        <div class="item-preview-card">
                                                            <div class="item-preview-icon" x-text="action.type === 'add' ? '📦' : (action.type === 'remove' ? '🗑️' : '✏️')"></div>
                                                            <div class="item-preview-name" x-text="action.itemName"></div>
                                                            <div class="item-preview-qty" x-show="action.quantity > 0" x-text="'x' + action.quantity"></div>
                                                        </div>
                                                    </template>
                                                </div>
                                                <p class="confirmation-question" x-text="language === 'Swedish' ? 'Vill du lägga till dessa varor?' : 'Add these items?'"></p>
                                                <div class="confirmation-actions">
                                                    <button @click="confirmActions(true)" class="btn-confirmation yes">
                                                        <span>✓</span>
                                                        <span x-text="language === 'Swedish' ? 'Ja, lägg till' : 'Yes, add them'"></span>
                                                    </button>
                                                    <button @click="confirmActions(false)" class="btn-confirmation no">
                                                        <span>✗</span>
                                                        <span x-text="language === 'Swedish' ? 'Nej, strunta' : 'No, skip'"></span>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                                
                                <!-- Typing Indicator -->
                                <div x-show="buyList.isLoading" class="message-wrapper assistant">
                                    <div class="ai-avatar-enhanced">🤖</div>
                                    <div class="message-bubble assistant">
                                        <div class="typing-indicator">
                                            <div class="dot"></div>
                                            <div class="dot"></div>
                                            <div class="dot"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Suggested Reply Buttons -->
                        <div x-show="buyList.suggestedReplies.length > 0 && !buyList.isLoading" class="suggested-replies-v2">
                            <template x-for="reply in buyList.suggestedReplies" :key="reply">
                                <button @click="sendChatMessage(reply)" class="suggested-reply-pill" x-text="reply"></button>
                            </template>
                        </div>

                        <!-- Chat Input -->
                        <div x-show="buyList.messages.length > 0 || buyList.isLoading" class="chat-input-v2">
                            <input type="text" 
                                   x-model="buyList.chatInput" 
                                   :placeholder="language === 'Swedish' ? 'Skriv till din assistent...' : 'Type to your assistant...'"
                                   @keyup.enter="sendChatMessage()"
                                   :disabled="buyList.isLoading">
                            <button @click="sendChatMessage()" 
                                    :disabled="buyList.isLoading || !buyList.chatInput.trim()"
                                    x-text="language === 'Swedish' ? 'Skicka' : 'Send'"></button>
                        </div>

                        <!-- Current List Panel (Floating) -->
                        <div x-show="buyList.items.filter(i => !i.isDismissed).length > 0" class="list-panel-v2" style="margin-top: 1.5rem;">
                            <div class="list-panel-header">
                                <h4 x-text="buyList.savedName || (language === 'Swedish' ? 'Din lista' : 'Your List')"></h4>
                                <span class="item-count" x-text="buyList.items.filter(i => !i.isDismissed).length + ' ' + (language === 'Swedish' ? 'varor' : 'items')"></span>
                            </div>
                            
                            <div class="list-items-v2">
                                <template x-for="item in buyList.items" :key="item.id">
                                    <div x-show="!item.isDismissed" class="list-item-v2">
                                        <div class="list-item-info">
                                            <div class="list-item-icon">🛒</div>
                                            <span class="list-item-name" x-text="item.itemName"></span>
                                        </div>
                                        <div class="list-item-actions-v2">
                                            <div class="quantity-stepper">
                                                <button @click="item.quantity > 1 && (item.quantity--)" :disabled="item.quantity <= 1">−</button>
                                                <input type="number" x-model="item.quantity" min="1" readonly>
                                                <button @click="item.quantity++">+</button>
                                            </div>
                                            <button @click="removeItem(item.id)" class="btn-remove" title="Remove">×</button>
                                        </div>
                                    </div>
                                </template>
                            </div>
                            
                            <div class="list-panel-footer">
                                <div class="save-bar">
                                    <input type="text" 
                                           x-model="buyList.customName" 
                                           :placeholder="language === 'Swedish' ? 'Namnge din lista (valfritt)' : 'Name your list (optional)'">
                                    <button @click="saveList(true)" class="btn-auto-name" 
                                            x-text="language === 'Swedish' ? 'Auto' : 'Auto'"></button>
                                    <button @click="saveList(false)" class="btn-save"
                                            x-text="language === 'Swedish' ? '💾 Spara' : '💾 Save'"></button>
                                </div>
                                <button @click="copyList()" class="btn-copy">
                                    📋 <span x-text="language === 'Swedish' ? 'Kopiera till urklipp' : 'Copy to clipboard'"></span>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- SUBTAB: View Lists (Saved Lists Browser) -->
                    <div x-show="shopSubtab === 'view'" class="subtab-content">
                        <!-- Loading State -->
                        <div x-show="savedLists === null || savedLists === undefined" class="empty-state-v2">
                            <div class="empty-icon">⏳</div>
                            <h3 x-text="language === 'Swedish' ? 'Laddar dina listor...' : 'Loading your lists...'"></h3>
                        </div>

                        <!-- Empty State -->
                        <div x-show="savedLists && savedLists.length === 0" class="empty-state-v2">
                            <div class="empty-icon">📋</div>
                            <h3 x-text="language === 'Swedish' ? 'Inga sparade listor än' : 'No saved lists yet'"></h3>
                            <p x-text="language === 'Swedish' ? 'Skapa din första inköpslista för att se den här!' : 'Create your first shopping list to see it here!'"></p>
                            <button class="btn-primary" @click="switchShopSubtab('create')" style="margin-top: 1rem;">
                                <span x-text="language === 'Swedish' ? 'Gå till Skapa lista →' : 'Go to Create List →'"></span>
                            </button>
                        </div>

                        <!-- Saved Lists Grid V2 -->
                        <div x-show="savedLists && savedLists.length > 0" class="saved-lists-grid-v2">
                            <template x-for="list in savedLists" :key="list.id">
                                <div class="saved-list-card-v2">
                                    <div class="saved-list-card-header-v2">
                                        <h4 class="saved-list-name-v2" x-text="list.name"></h4>
                                        <div class="saved-list-meta-v2">
                                            <span class="saved-list-date">
                                                📅 <span x-text="formatDate(list.createdAt)"></span>
                                            </span>
                                            <span class="saved-list-count" x-text="list.itemCount"></span>
                                        </div>
                                    </div>
                                    
                                    <!-- Visual Item Preview -->
                                    <div class="saved-list-preview-v2">
                                        <template x-for="(item, idx) in list.items.slice(0, 4)" :key="idx">
                                            <div class="mini-list-item">
                                                <div class="mini-list-checkbox checked">✓</div>
                                                <span x-text="item.itemName + ' x' + item.quantity"></span>
                                            </div>
                                        </template>
                                        <div x-show="list.itemCount > 4" class="mini-list-more" 
                                             x-text="'+ ' + (list.itemCount - 4) + ' ' + (language === 'Swedish' ? 'fler varor' : 'more items') + '...'"></div>
                                    </div>
                                    
                                    <!-- Actions -->
                                    <div class="saved-list-actions-v2">
                                        <button @click="useSavedList(list.id)" class="btn-list-action use">
                                            <span class="icon">📋</span>
                                            <span x-text="language === 'Swedish' ? 'Kopiera' : 'Copy'"></span>
                                        </button>
                                        <button @click="editSavedList(list.id)" class="btn-list-action edit">
                                            <span class="icon">✏️</span>
                                            <span x-text="language === 'Swedish' ? 'Redigera' : 'Edit'"></span>
                                        </button>
                                        <button @click="deleteSavedList(list.id)" class="btn-list-action delete">
                                            <span class="icon">🗑️</span>
                                            <span x-text="language === 'Swedish' ? 'Ta bort' : 'Delete'"></span>
                                        </button>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </section>
            </template>
        </main>
    </div>

    <!-- Chat Slide-over -->
    <div x-show="showChat" class="chat-overlay" @click.self="showChat = false" x-cloak>
        <div class="chat-window" x-transition:enter="chat-slide-in" x-transition:leave="chat-slide-out">
            <div class="chat-header">
                <h3 x-text="t('chat.title')"></h3>
                <button @click="showChat = false">×</button>
            </div>
            <div class="chat-messages" x-ref="chatBox">
                <template x-for="msg in chatHistory" :key="msg.id">
                    <div class="msg-wrapper" :class="msg.role === 'user' ? 'user' : 'assistant'">
                        <div class="msg-bubble" x-text="msg.content"></div>
                    </div>
                </template>
                <div x-show="chatLoading" class="msg-wrapper assistant">
                    <div class="msg-bubble loading-dots">...</div>
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" x-model="chatInput" :placeholder="t('chat.placeholder')" @keyup.enter="sendMessage">
                <button @click="sendMessage" :disabled="chatLoading" x-text="t('chat.send')"></button>
            </div>
        </div>
    </div>

    <!-- Toasts -->
    <template x-for="toast in toasts" :key="toast.id">
        <div class="toast" :class="toast.type" x-text="toast.message" @click="removeToast(toast.id)"></div>
    </template>

    <!-- Add Item Modal -->
    <div x-show="showAddModal" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0" class="modal-overlay" @click.self="showAddModal = false" @keydown.escape.window="showAddModal = false">
        <div class="modal-content" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-95">
            <h3 x-text="t('inv.add')"></h3>
            <input type="text" x-model="newItemName" :placeholder="t('prompt.add')" @keyup.enter="submitAddItem">
            <div class="modal-actions">
                <button @click="showAddModal = false" x-text="t('modal.cancel')"></button>
                <button class="btn-primary" @click="submitAddItem" x-text="t('modal.confirm')"></button>
            </div>
        </div>
    </div>

    <!-- i18n Translations -->
    <script src="js/i18n.js"></script>
    
    <!-- Feature Modules -->
    <script src="features/inventory/inventory.js"></script>
    <script src="features/scan/scan.js"></script>
    <script src="features/receipts/receipts.js"></script>
    <script src="features/chat/chat.js"></script>
    <script src="features/shopping/shopping.js"></script>
    
    <!-- Main App Orchestrator -->
    <script src="js/main.js"></script>
</body>
</html>
