<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeStoq | Smart Pantry</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body x-data="pantryApp()">
    
    <div class="container">
        <header>
            <div class="brand">
                <h1>HomeStoq</h1>
                <p>Intelligent Pantry Assistant</p>
            </div>
            <nav>
                <button class="nav-link" :class="view === 'inventory' && 'active'" @click="view = 'inventory'" x-text="t('nav.stock')"></button>
                <button class="nav-link" :class="view === 'receipt' && 'active'" @click="view = 'receipt'" x-text="t('nav.scan')"></button>
                <button class="nav-link" :class="view === 'shopping' && 'active'" @click="view = 'shopping'" x-text="t('nav.list')"></button>
            </nav>
        </header>

        <!-- Dashboard Pulse -->
        <div class="pulse-bar" x-show="view === 'inventory'">
            <div class="pulse-stat">
                <span class="label" x-text="t('pulse.total')"></span>
                <span class="value" x-text="items.length"></span>
            </div>
            <div class="pulse-stat">
                <span class="label" x-text="t('pulse.low')"></span>
                <span class="value" x-text="items.filter(i => i.quantity <= 1).length" :style="items.filter(i => i.quantity <= 1).length > 0 && 'color: var(--zest)'"></span>
            </div>
            <div class="pulse-stat">
                <span class="label" x-text="t('pulse.cats')"></span>
                <span class="value" x-text="Object.keys(categorizedItems).length"></span>
            </div>
        </div>

        <main>
            <!-- View: Inventory -->
            <template x-if="view === 'inventory'">
                <section>
                    <div class="view-controls">
                        <div class="search-wrapper">
                            <input type="text" class="search-input" :placeholder="t('inv.search')" x-model="search">
                            <button x-show="search.length > 0" class="search-clear" @click="search = ''" aria-label="Clear search">×</button>
                        </div>
                        <button class="btn-primary" @click="manualAdd()" x-text="t('inv.add')" aria-label="Add new item"></button>
                    </div>

                    <div x-show="loading" class="state-box">
                        <div class="spinner"></div>
                        <p x-text="t('inv.refreshing')"></p>
                    </div>

                    <div x-show="!loading && items.length === 0" class="state-box">
                        <h3 x-text="t('inv.empty.title')"></h3>
                        <p x-text="t('inv.empty.desc')"></p>
                    </div>

                    <div class="masonry-grid">
                        <template x-for="(group, category) in categorizedItems" :key="category">
                            <div class="category-group" x-show="group.length > 0">
                                <h2 class="category-title" x-text="category"></h2>
                                <ul class="item-list">
                                    <template x-for="item in group" :key="item.itemName">
                                        <li class="item-row" :class="item.quantity <= 1 && 'low-stock'">
                                            <div class="item-info">
                                                <span x-show="item.quantity <= 1" class="low-stock-dot"></span>
                                                <span class="item-name" x-text="item.itemName"></span>
                                            </div>
                                            <div class="qty-pill">
                                                <button class="qty-act" @click="updateQty(item.itemName, -1)">−</button>
                                                <span class="qty-val" x-text="formatQty(item.quantity)"></span>
                                                <button class="qty-act" @click="updateQty(item.itemName, 1)">+</button>
                                            </div>
                                        </li>
                                    </template>
                                </ul>
                            </div>
                        </template>
                    </div>
                </section>
            </template>

            <!-- View: Receipt Scan -->
            <template x-if="view === 'receipt'">
                <section>
                    <div class="view-header">
                        <h2 x-text="t('scan.title')"></h2>
                        <p class="view-description" x-text="t('scan.desc')"></p>
                    </div>

                    <div class="scan-area">
                        <label class="dropzone">
                            <input type="file" @change="handleFile" accept="image/*" capture="environment" hidden>
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
                            <span x-text="t('scan.photo')"></span>
                        </label>
                        <label class="dropzone">
                            <input type="file" @change="handleFile" accept="image/*,application/pdf" hidden>
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                            <span x-text="t('scan.doc')"></span>
                        </label>
                    </div>

                    <div x-show="selectedFile" class="scan-ready">
                        <p x-text="t('scan.ready') + ' ' + selectedFile?.name"></p>
                        <button class="btn-primary" @click="uploadReceipt" :disabled="scanning">
                            <span x-show="!scanning" x-text="t('scan.btn')"></span>
                            <span x-show="scanning" x-text="t('scan.btn.active')"></span>
                        </button>
                    </div>

                    <div x-show="scanResults.length > 0" class="scan-results">
                        <h3 class="category-title" x-text="t('scan.results')"></h3>
                        <ul class="item-list">
                            <template x-for="res in scanResults" :key="res.itemName">
                                <li class="scan-result-row">
                                    <span class="item-name" x-text="res.itemName + ' (x' + res.quantity + ')'"></span>
                                    <span class="item-meta" x-text="res.price ? formatCurrency(res.price) : 'No price'"></span>
                                </li>
                            </template>
                        </ul>
                    </div>
                </section>
            </template>

            <!-- View: Smart List -->
            <template x-if="view === 'shopping'">
                <section>
                    <div class="view-header">
                        <h2 x-text="t('list.title')"></h2>
                        <p class="view-description" x-text="t('list.desc')"></p>
                    </div>

                    <div class="list-actions">
                        <button class="btn-primary" @click="fetchSuggestions" :disabled="loadingSuggestions">
                            <span x-show="!loadingSuggestions" x-text="t('list.btn')"></span>
                            <span x-show="loadingSuggestions" x-text="t('list.btn.active')"></span>
                        </button>
                    </div>

                    <div x-show="!loadingSuggestions && suggestions.length === 0" class="state-box">
                        <p x-text="t('list.empty')"></p>
                    </div>

                    <div x-show="suggestions.length > 0">
                        <h3 class="category-title suggestions-header" x-text="t('scan.results')"></h3>
                        <ul class="item-list">
                            <template x-for="sug in suggestions" :key="sug.ItemName">
                                <li class="item-row">
                                    <div class="item-info">
                                        <span class="item-name" x-text="sug.ItemName"></span>
                                        <p class="suggestion-reason" x-text="sug.Reason"></p>
                                    </div>
                                    <span class="suggestion-qty" x-text="sug.Quantity"></span>
                                </li>
                            </template>
                        </ul>
                    </div>
                </section>
            </template>
        </main>
    </div>

    <!-- Toasts -->
    <template x-for="toast in toasts" :key="toast.id">
        <div class="toast" :class="toast.type" x-text="toast.message" @click="removeToast(toast.id)"></div>
    </template>

    <!-- Add Item Modal -->
    <div x-show="showAddModal" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0" class="modal-overlay" @click.self="showAddModal = false" @keydown.escape.window="showAddModal = false">
        <div class="modal-content" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-95">
            <h3 x-text="t('inv.add')"></h3>
            <input type="text" x-model="newItemName" :placeholder="t('prompt.add')" @keyup.enter="submitAddItem">
            <div class="modal-actions">
                <button @click="showAddModal = false" x-text="t('modal.cancel')"></button>
                <button class="btn-primary" @click="submitAddItem" x-text="t('modal.confirm')"></button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
